
services:
  acados:
    user: "${USER_ID}:${GROUP_ID}"
    image: acados:latest
    build:
      context: .
      dockerfile: dockerfile
    container_name: acados
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ./src/vehicle_nmpc:/workspace/vehicle_nmpc:ro
      - ./runs:/workspace/runs
    tty: true
    stdin_open: true
    working_dir: /workspace
    command: ["/bin/sh", "-lc", "chown -R ${USER_ID}:${GROUP_ID} /workspace/runs && exec python3 -m vehicle_nmpc.run"]
