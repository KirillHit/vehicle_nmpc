
services:
  acados:
    build:
      context: .
      dockerfile: dockerfile
    image: acados:latest
    container_name: acados
    environment:
      DISPLAY: "${DISPLAY}"
      XAUTHORITY: /tmp/.docker.xauth
      QT_X11_NO_MITSHM: "1"
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-$HOME/.Xauthority}:/tmp/.docker.xauth:ro
      - ./src/vehicle_nmpc:/workspace/vehicle_nmpc:ro
      - ./runs:/workspace/runs
    tty: true
    stdin_open: true
    working_dir: /workspace
    command:
      - /bin/bash
      - -lc
      - python3 -m vehicle_nmpc.run
